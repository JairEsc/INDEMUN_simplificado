    <script>
        try {
            // Crear mapa y centrarlo (latitud, longitud, zoom)
            var map = L.map('map',{zoomControl: false }).setView([20.5, -98.9], 9);

            // Cargar y mostrar los tiles de OpenStreetMap
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors',
                maxZoom: 13
            }).addTo(map);

            //var marker = L.marker([20.5, -98.9]).addTo(map);
            //marker.bindPopup("<b>¡Hola!</b><br>Este es un marcador en Hgo.").openPopup();

        } catch (error) {
            console.error("Error al cargar el mapa:", error);
        }

//////////////////Variables Globales////////////////////////////////////////////////////////////////////////////
////////////////////////////////////////////////////////////////////////////////////////////////////////////////

        //Ya tenemos lo básico, es momento de declarar las variables globales necesarias para después

        //Para la gráfica de pastel
        let data;
        let Grafica;
        //const ctx =document.getElementById('myChart').getContext('2d');

        //const modal = document.getElementById("chartModal");
        //const openBtn = document.getElementById("openModal");
        //const closeBtn = document.getElementById("closeModal");




        //Estas son vitales pues serán las que constantemente dicten la selección en la que estamos
        let Modulo= "1"; //del 1 al 8
        let Tema = "1"; // entre el 1 y el 6 (aunque la mayoría tienen menos)
        let Indicador = "1"; // entre el 1 y el 10 (aunque la mayoría tienen menos)
        let Año= "25"; //// entre el 20 y el 25 (según el año actual)
        let Municipio="13048"
        //Nos vamos al 1.1.1 de 2025 por defecto

        //Creemos las variables que vamos a necesitar para el pop up de cada municipio
        //Estas son las que servirán para el histórico
        let A20 = 0;
        let A21 = 0;
        let A22 = 0;
        let A23 = 0;
        let A24 = 0;
        let A25 = 0;

        //Estas son para gráfica de pastel
        let v_AñoMpio = 0;
        let a_AñoMpio = 0;
        let r_AñoMpio = 0;
        let nm_AñoMpio = 0;
        let ndR_AñoMpio = 0;
        let nd_AñoMpio = 0;

        //Estas son para la gráfica por Módulo-Año-Municipio
        let v_ModAñoMpio = 0;
        let a_ModAñoMpio = 0;
        let r_ModAñoMpio = 0;
        let nm_ModAñoMpio = 0;
        let ndR_ModAñoMpio = 0;
        let nd_ModAñoMpio = 0;

        //Estas son para la gráfica anual
        let Optimos = [];
        let EnProcesos = [];
        let Rezagos = [];
        let RezNoInfo = [];
        let NoDispo = [];
        let NoMedible = [];
    
        let Mapa_Act;
////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

        //Todo el trabajo se basará en las sigiuentes clasificaciones:
        //v = óptimo (verde) = 1
        //a = en proceso (amarillo) = 2
        //r = rezago (rojo) = 3
        //ndR = rezago por no presentar información (rojo obscuro) = 5
        //nd = información no disponible (gris) = 0
        //nm = no medible (blanco) = 4


        // Función para determinar el color según el valor del indicador
        const getColor = (value) => {
            if (value === null || value === undefined) {
                return 'rgba(0, 0, 0, 0.95)'; // Negro para valores no definidos
            }
            switch (value) {
                case 1: //Optimo
                return '#54AB18';  // Verde con 80% de opacidad //ORIGINAL: 144,232,82
                case 2: //En proceso
                return '#FFF540';  // Amarillo con 80% de opacidad
                case 3: //Rezago
                return '#FF0000';     // Rojo con 80% de opacidad
                case 4://No medible
                return '#757575'; // Blanco con 80% de opacidad
                case 0: //Información no disponible
                return '#B0B0B0'; // Gris con 80% de opacidad
                case 5: //Rezago por no presentar información
                return '#662D2D'; // Rojo obscuro con 80% de opacidad
                default:
                return 'rgba(0, 0, 0, 0.95)';  // Negro con 95% de opacidad para valores desconocidos
            }
        };

        

        //La función debe recibir las 4 clasificaciones y luego mostrar el mapa
        //y obtener el la información necesaria para las gráficas

        //Función para filtrar por columnas (lo defino como función porque se va a ocupar bastante)
        function filtrarPorCol(data, columnasPermitidas) {
            return {
                type: "FeatureCollection",
                features: data.features.map(f => ({
                    type: "Feature",
                    geometry: f.geometry,
                    properties: Object.fromEntries(
                        Object.entries(f.properties)
                            .filter(([key]) => columnasPermitidas.includes(key))
                    )
                }))
            };
        }

        //Esta función es un poco  rebuscada pero es completamente necesaria para el popup
        //Tendré que explicarla a detalle en algún lado
        map.on('popupopen', function (e) {
            const popupNode = e.popup.getElement();

            //Buscamos el canvas EXCLUSIVAMENTEEEEEE dentro del popup o puede haber problema
            const CanvasID= popupNode.querySelector('#canvasPopup');
            if (CanvasID) { //Si sí lo encuentra...
                //RECUADROS   
                //Modificación: Ahora se debe buscar en Data2 pues el "e" está filtrado solo al año del select, por lo que 
                //los demás años aparecerían en negro, entonces hay que buscar en el feature collectiom original

                //Buscamos primero cual es la NOMGEO del municipio que ACTUALMENTE tiene el popup
                const Mpio_NOMGEO = e.popup._source.feature.properties.NOMGEO;

                //Ahora nos vamos al Data2 que viene del GeoJDON original y buscamos ese municipio
                const Mpio_Act = Data2.features.find(f => f.properties.NOMGEO === Mpio_NOMGEO).properties;

                
                for(const año of ["20","21","22","23","24","25"]){
                    const recuadro25 = popupNode.querySelector('#recuadro_A'+año);
                        if (año === Año) {  //O sea que se fija en el que corresponda al año seleccionado
                            recuadro25.style.border = "2px solid #000000";
                            recuadro25.style.transform = "scale(1.15)";
                            recuadro25.style.boxShadow = "0 0 8px rgba(0,0,0,0.5)";
                            //recuadro25.style.zIndex = "10";
                        }
                        let valor25 = Mpio_Act["M" + Modulo + "_" + Tema + "_" + Indicador + "_"+año];
                        recuadro25.style.backgroundColor = getColor(valor25);

                        //Como puse el texto blanco hay que checar que siempre se vea bien
                        //Lo puse blanco porque el color por defecto del recuadro es el que tienepor defecto la
                        //función del getColor, que es negro, que sale cuando NO encuentra el dato de ese año
                        if (valor25==2|| valor25==4 || valor25==0){ //Es decir, si el color de el indicador en ese año es blanco o amarillo
                            recuadro25.style.color = "black";
                        }
                }

                //TITULO del popup
                //Solo se me ocurrió acceder al select y extraer el TEXTO que corresponde a la descripción del Indicador
                const Indicador_seleccionado = document.getElementById('selector_indicador').options[document.getElementById('selector_indicador').selectedIndex].text;
                const titulo = popupNode.querySelector('#indicador_popup');
                //console.log(textoSeleccionado);
                if(titulo){
                    titulo.textContent =Indicador_seleccionado;
                }

                //Por lo visto debe haber un pequeño momento para que Chart tenga tiempo, o si no la gráfica no
                //alcanza a colocarse en el popup y se ve vacío
                setTimeout(() => {
                    Tarjeta_indv(Modulo, Tema, Indicador, Año, Mpio_NOMGEO, CanvasID);
                }, 100);
            }
        });
        map.on('zoomend', function() {
            const etiquetas = document.querySelectorAll('.etiqueta');
            etiquetas.forEach(nombre => {
                nombre.style.display = map.getZoom()<11? 'none' : 'block';
            });
        });

        //Ahora vamos a hacer la semaforización
        const semaforizacion = L.control({ position: 'bottomright' });

        semaforizacion.onAdd = function() {
            const niveles = [1, 2, 3, 5, 0, 4]; //los puse así porque así van también en las gráficas
            const N_Indicador = ["Óptimo (v)", "En Proceso (a)", "Rezago (r)",
                "Sin Información (ndR)", "No Disponible (nd)", "No Medible (nm)"];

            const div = L.DomUtil.create('div'); //Bendita funcion de Leaflet

            div.innerHTML = '<strong style="display:block; margin-bottom:8px; text-align:center;">Semaforización</strong>';
            //Ahora añadimos el cuadrito de color y su descripción
            for (let i=0; i<6; i++) {
                div.innerHTML += `
                    <div style="display: flex; align-items: center; margin-bottom: 4px;">
                        <i style="background: ${getColor(niveles[i])}; width: 18px; height: 18px; display: inline-block; margin-right: 8px; border-radius: 3px; border: 1px solid #999;"></i>
                        <span>${N_Indicador[i]}</span>
                    </div>`;
            }

            div.style.background = "rgba(255, 255, 255, 0.9)";
            div.style.padding = "12px";
            div.style.borderRadius = "8px";
            div.style.boxShadow = "0 0 10px rgba(0,0,0,0.5)";
            div.style.fontSize = "13px";
            div.style.color = "#333";
            div.style.width = "12vw";
            div.style.minWidth = "150px";
            //div.style.marginBottom = "6vh";
            //div.style.marginRight = "1vw";
            
            return div;
        };
        semaforizacion.addTo(map);
        //

        //Ahora el buscador
        const buscador = L.control({ position: 'bottomleft' }); //Pero al fianl no esta abajo a la izquierda

        buscador.onAdd = function() {
            const div = L.DomUtil.create('div', 'buscador_Mpio'); //Desde ahora es mi nueva función favorita porque
                                                                  //hasta la clase deja asignarle
            div.innerHTML = `
                <div style="background: white; padding: 5px; border-radius: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.5); display: flex; align-items: center;">
                    <input list="municipios" id="input-busqueda" placeholder="Buscar municipio:" 
                        style="padding: 10px 15px; border-radius: 20px; border: none; width: 15vw; outline: none; font-size: 14px;">
                    <datalist id="municipios">
                        ${Data2.features.map(f => `<option value="${f.properties.NOMGEO}">`).join('')}
                    </datalist>
                </div>
            `;
            div.querySelector('#input-busqueda').onchange = function(e) {
                const clave = e.target.value;
                Mapa_Act.eachLayer(layer => {
                    if (layer.feature.properties.NOMGEO === clave) {
                        //Esto es lo que hace zoom
                        map.flyToBounds(layer.getBounds(), {
                            padding: [100, 100], //Es un margen que le da al feature con el zoom
                            duration: 0.5
                        });
                        //y ya que no se mueva la pantalla
                        map.once('moveend', function() {
                            layer.fireEvent('click');
                        });

                        //Está muy útil para ir viajando entre municipios
                        e.target.value = "";
                    };
                });
            };

            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        buscador.addTo(map);

        //Ahora hay que hacer el "hover"
        const Hover = L.control({ position: 'bottomright' });

        Hover.onAdd = function (map) {
            this._div = L.DomUtil.create('div'); //Todos los días le rezo a DomUtil
                                                //Como la vamos a partir en dos el this._ ayuda a guardarlo
            this.update();
            return this._div;
        };

        Hover.update = function (props,columna) { //Ahora usamos esta de .update que es lo que ayuda a actualizar los contenidos
            if (props) {
                const valor = props[columna]; 
                this._div.style.display = "block";

                this._div.innerHTML = `
                    <div style="display: flex; align-items: center; background: white; padding: 10px 15px; border-radius: 25px; box-shadow: 0 0 10px rgba(0,0,0,0.2); margin-bottom: 10px;">
                        <div style="background: ${getColor(valor)}; width: 18px; height: 18px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); margin-right: 12px; flex-shrink: 0;"></div>
                        <div style="display: flex; flex-direction: column;">
                            <strong style="font-size: 14px; color: #333; line-height: 1.2;">${props.NOMGEO}</strong>
                        </div>
                    </div>
                `;
                this._div.style.width = window.screen.width<450?"45vw":"15vw";
                this._div.style.maxWidth = "50vw";
                
            }
        };

        Hover.addTo(map);
        //
        //Ahora el recuadro del título, y obvi, vamos a copiar y pegar la estructura de las anteriores y el bendito 
        //DomUtil
        //Funcionan muy bien especialmente por el zoom, igual que en el R
        const Titulo = L.control({ position: 'topright' });

        Titulo.onAdd = function() {
            this._div = L.DomUtil.create('div'); //Todos los días le rezo a DomUtil
                                                //Como la vamos a partir en dos el this._ ayuda a guardarlo
            return this._div;
        };

        Titulo.update = function(Año) { //Ahora usamos esta de .update que es lo que ayuda a actualizar los contenidos
            if (Año) {
                let Indicador_seleccionado=document.getElementById('selector_indicador').options[document.getElementById('selector_indicador').selectedIndex].text;
                //let Solo_Indicador= Indicador_seleccionado.split('.')[2]
                //Para poder extraer solo el texto sin los indices que le puse al descriptor tuve que pedir ayuda tal cual
                //El poderosismo chat dice que:
                // /^[\d.\s]+/ significa:
                // ^ : Empieza a buscar desde el inicio
                // [\d.\s] : Busca dígitos (\d), puntos (.) o espacios (\s)
                // + : Que se repitan una o más veces
                let Solo_Indicador = Indicador_seleccionado.replace(/^[\d.\s]+/, ""); //Me gusta más en R
                console.log(Solo_Indicador);
                this._div.innerHTML = `
                    <div style="background: 'rgb(98,17,50)'; padding: 12px 20px; border-radius: 1px;">
                        <h2 style="margin: 0; font-size: 16px; color: #FFFFFF; text-transform: uppercase;">
                            <strong>Indicador:</strong> ${Solo_Indicador}
                        </h2>
                        <h3 style="color: white; border-radius: 4px; font-size: 18px;">
                            Año 20${Año}
                        </h3>
                    </div>
                `;
                this._div.style.minWidth = "80px";
                this._div.style.maxWidth = "40vw";
                this._div.style.background="rgb(98,17,50)";
            }
        };
        Titulo.addTo(map);

        //Los logos
        const Logo = L.control({ position: 'bottomleft' });

        Logo.onAdd = function() {
            img = L.DomUtil.create('img'); //Todos los días le rezo a DomUtil
                                                //Como la vamos a partir en dos el this._ ayuda a guardarlo
            img.src = 'Logos.png';
            img.style.width = '20vw';
            img.style.minWidth='150px';
            

            return img;
        };
        Logo.addTo(map);
        
        let CapaDestacada = null;
        function Crear_Mapa(M,T,I,A) {
            //Cada que la función se manda a lapp\LOGO INDEMUN1-04.pnglamar para crear el mapa reescribirá los valores 
            //de las variables globales de la selección actual
            Modulo = M;
            Tema = T;
            Indicador = I;
            Año = A;
            let Combinacion ="M"+M+"_"+T+"_"+I+"_"+A;

            // Filtramos solo las columnas deseadas
            const columnas = [Combinacion, "NOMGEO"];
            const geojsonFiltrado = filtrarPorCol(Data2, columnas);

            if (Mapa_Act) {
                map.removeLayer(Mapa_Act);
            }
            Titulo.update(A); //No ocupa más cosas, así que puede ir aquí o un poco antes creo
            Mapa_Act = L.geoJSON(geojsonFiltrado, {
                style: function(feature) {
                    const valor = feature.properties[Combinacion];

                    return {
                        fillColor: getColor(valor),
                        weight: 1,
                        opacity: 1,
                        color: 'black',
                        fillOpacity: 1,
                    };
                },
                onEachFeature: function (feature, layer) {
                    //Aquí es cuando le pasamos por encima el cursor a algún feature
                    layer.on({
                        mouseover : function (e) {
                            if(CapaDestacada){
                                Mapa_Act.resetStyle(CapaDestacada);
                            }
                            var hovLayer = e.target;
                            hovLayer.setStyle({
                                color: "white",
                                weight: '5',
                            });
                            hovLayer.bringToFront();
                            //Y se actualiza el hover
                            Hover.update(hovLayer.feature.properties,Combinacion);
                            CapaDestacada=hovLayer;
                        },
                        touchend: function (e) { //Solo para telefono
                            Mapa_Act.resetStyle(e.target);
                            
                            //Y se actualiza el hover
                            Hover.update();
                            CapaDestacada=null;
                        },
                        mouseout : function (e) {
                            Mapa_Act.resetStyle(e.target);
                            
                            //Y se actualiza el hover
                            Hover.update();
                            CapaDestacada=null;
                        }

                    });
                    layer.on("click", function () {
                        //Tarjeta_indv(Modulo, Tema, Indicador, Año, feature.properties.NOMGEO);
                        //Tarjeta_por_Modulo(Modulo, Año, feature.properties.NOMGEO);
                        //Tarjeta_por_Año(Año);
                        //Municipio = feature.properties.NOMGEO
                        // 1. Creamos un contenedor temporal para el popup
                        const contenedor = document.createElement('div');
                        contenedor.style.cssText = "width:300px; min-height:350px; display:block;"; 
                        contenedor.innerHTML = `
                            <div style="min-width: 220px; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                                <h2 style="margin: 0 0 5px 0; font-size: 20px; color: #2c3e50; font-weight: 800; text-transform: uppercase;">
                                    ${feature.properties.NOMGEO}
                                </h2>
            
                                <hr style="border: 0; height: 2px; background: linear-gradient(to right, transparent, #404040, transparent); margin: 10px 0 15px 0;">

                                <h3 id="indicador_popup" style="text-align:center; font-size:14px; margin-bottom:10px;">No Carga</h3>
                                <h4 id="indicador_popup" style="font-size:11px; margin-bottom:10px;"><strong>Histórico:</strong></h4>
                                <div id="contenedor_historico" style="display: flex; justify-content: center; gap: 5px; margin-bottom: 15px;">
                                    <div id="recuadro_A20" title="Año 2020" class="recuadros"">2020</div>
                                    <div id="recuadro_A21" title="Año 2021" class="recuadros"">2021</div>
                                    <div id="recuadro_A22" title="Año 2022" class="recuadros"">2022</div>
                                    <div id="recuadro_A23" title="Año 2023" class="recuadros"">2023</div>
                                    <div id="recuadro_A24" title="Año 2024" class="recuadros"">2024</div>
                                    <div id="recuadro_A25" title="Año 2025" class="recuadros"">2025</div>

        //Para ello crearemos 4 objetos tipo select en el index, pero necesitamos una forma de llenar las opciones
        //Dado que el Tema depende del Módulo y el Indicador del Módulo y el Tema usaremos dos funciones que rellenen las opcciones 
        //de sus respectivos select

        //INDICADOR
        function rellenar_Indicador(T){ //T nos dirá el Tema que se ha seleccionado
            const menu = document.getElementById("selector_indicador");
            menu.innerHTML = ""; // Se supone que borra fácil TODAS las opciones del select

            let filtrado_M=Lista_Descriptor.filter(v => v[1].split("_")[0] === T);
            let lista= filtrado_M.map(fila => fila[2]);

            lista.forEach(ind => {
                const opcion = document.createElement("option");
                opcion.value = ind.split("_")[0];
                opcion.text = ind.replace(/\_/g, " ");
                menu.appendChild(opcion);
            })
            
            Crear_Mapa(T.split(".")[0],T.split(".")[1],"1",Año);
        }

        //TEMA
        function rellenar_Tema(M){ //X nos dirá el Módulo que se ha escogido
            const menu = document.getElementById("selector_tema");
            menu.innerHTML = ""; // Se supone que borra fácil TODAS las opciones del select

            let filtrado_M=Lista_Descriptor.filter(v => v[0].split("_")[0] === M);
            let lista_sucia= filtrado_M.map(fila => fila[1]); //En esta se repite los valores tal como en el excel
            let lista = lista_sucia.filter((item, index) => lista_sucia.indexOf(item) === index); //Esto limpia como un unique

            lista.forEach(ind => {
                const opcion = document.createElement("option");
                opcion.value = ind.split("_")[0];
                opcion.text = ind.replace(/\_/g, " ");
                menu.appendChild(opcion);
            })
            rellenar_Indicador(M+".1");
            Crear_Mapa(M,"1","1",Año);

        }
        //Ahora queremos la función que genera y cambia la grafica de pastel
        function Gráfica_Pastel(Mpio,ID){
            const canvas = (typeof ID === 'string') ? document.getElementById(ID) : ID;
            if (!canvas) {
                console.error("No se encontró el canvas con ID:", ID);
                return;
            }
            const ctx = canvas.getContext('2d');
            data = {
                labels: ['Optimos', 'En Proceso', 'Rezago','Rezago por no información', 'No disponible', 'No medible'],
                datasets: [
                    {
                        data: [v_AñoMpio,a_AñoMpio,r_AñoMpio,ndR_AñoMpio,nd_AñoMpio,nm_AñoMpio],
                        backgroundColor: [
                            '#54AB18',
                            '#FFF540',
                            '#FF0000',
                            '#662D2D',
                            '#B0B0B0',
                            '#757575'
                        ]
                    }
                ]
            };
            if (Grafica) {
                Grafica.destroy();
            }
            Grafica = new Chart(ctx, {
                type: 'pie',
                data: data,
                options: {
                    responsive: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                        },
                        title: {
                            display: true,
                            text: 'Indicadores en '+Mpio+' en el año 20'+Año
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context){
                                    x=context.formattedValue.split(",")[0];
                                    y=context.formattedValue.split(",")[1];
                                    z=y.slice(0,2);
                                    return x+"."+z+"%";
                                }
                            }
                        }
                    }
                },
            });

        }
