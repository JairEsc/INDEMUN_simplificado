    <script>
        //Variables globales
        let Modulo="1";

        //Variables para las gráfica de barras

        let data0;
        let Grafica2;
        const ctx2 =document.getElementById('myChart2').getContext('2d');


        //Estas son para la gráfica por Módulo-Año-Municipio
        let v_ModAñoMpio = 0;
        let a_ModAñoMpio = 0;
        let r_ModAñoMpio = 0;
        let nm_ModAñoMpio = 0;
        let ndR_ModAñoMpio = 0;
        let nd_ModAñoMpio = 0;

        //Arreglos para guardar para cada municipio

        let EnProcesos = [];
        let Rezagos = [];
        let RezNoInfo = [];
        let NoDispo = [];
        let NoMedible = [];

        //LA función para filtrar columnas
        function filtrarPorCol(data, columnasPermitidas) {
            return {
                type: "FeatureCollection",
                features: data.features.map(f => ({
                    type: "Feature",
                    geometry: f.geometry,
                    properties: Object.fromEntries(
                        Object.entries(f.properties)
                            .filter(([key]) => columnasPermitidas.includes(key))
                    )
                }))
            };
        }
        //Función para los datos por Modulo, Año y Municipio
        function Tarjeta_por_Modulo(M,A){
            Modulo=M;
            Año=A;
            let Mpio=document.getElementById('selector_Mpio').options[document.getElementById('selector_Mpio').selectedIndex].text;
            let geojsonFiltrado = Data2.features.find(
                f => f.properties.NOMGEO === Mpio
            );
            let columnas_modulo= Object.keys(geojsonFiltrado.properties).filter(col => col.split("_")[0] === "M"+M && col.split("_")[3] === A).concat(["NOMGEO"]);
            const geojsonFiltrado2 = filtrarPorCol(Data2, columnas_modulo);

            let geojsonFiltrado3 = geojsonFiltrado2.features.find(
                f => f.properties.NOMGEO === Mpio
            );
            let modulos_año= columnas_modulo.map(col => geojsonFiltrado3.properties[col]);

            v_ModAñoMpio = (modulos_año.filter(v => Number(v) === 1).length);
            a_ModAñoMpio = (modulos_año.filter(v => Number(v) === 2).length);
            r_ModAñoMpio = (modulos_año.filter(v => Number(v) === 3).length);
            nm_ModAñoMpio = (modulos_año.filter(v => Number(v) === 4).length);
            ndR_ModAñoMpio = (modulos_año.filter(v => Number(v) === 5).length);
            nd_ModAñoMpio = (modulos_año.filter(v => Number(v) === 0).length);

            Gráfica_Barras1(Mpio);
            
        }
        //Ahora queremos la función que genera y cambia la grafica de barras por Modulo-Año-Municipio
        function Gráfica_Barras1(Mpio){
            const loader=document.getElementById("loading-message");
            loader.style.visibility="visible";

            data2 = {
            labels: ['Optimos', 'En Proceso', 'Rezago','Rezago por no información', 'No disponible', 'No medible'],
            datasets: [
                {
                label: 'Óptimo',
                data: [v_ModAñoMpio,a_ModAñoMpio,r_ModAñoMpio,ndR_ModAñoMpio,nd_ModAñoMpio,nm_ModAñoMpio],
                backgroundColor: [
                    '#54AB18',
                    '#FFF540',
                    '#FF0000',
                    '#662D2D',
                    '#B0B0B0',
                    '#757575'
                ],
                borderColor: [
                    '#54AB18',
                    '#FFF540',
                    '#FF0000',
                    '#662D2D',
                    '#B0B0B0',
                    '#757575'
                ],
                borderWidth: 1
                }]
            };
            if (Grafica2) {
                Grafica2.destroy();
            }
            Grafica2 = new Chart(ctx2, {
                type: 'bar',
                data: data2,
                options: {
                    responsive: true,           // ¡Cambiado de false a true!
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    },
                    plugins: {
                        legend: {
                            display: false,
                            position: 'top',
                            onClick: (e) => { 
                                //Al dejar esto vacío, el clic no hace nada
                                return null; 
                            },
                        },

                        title: {
                            display: true,
                            text: 'Indicadores en '+Mpio+' en el año 20'+Año
                        }
                    },
                    animation: {
                        onComplete: () =>{
                            loader.style.visibility="hidden";
                        },
                        onProgress: function(){
                            loader.style.visibility="visible";
                        }
                    }
                },
            });
        }
        //Función para los datos del Total por municipio 
        function Tarjeta_por_Año(A){
            Año=A;

            let geojsonFiltrado = Data2.features.find(
                f => f.properties.NOMGEO === "Apan" //No importa, esto solo es por mi facilidad
            );

            //Debemos reiniciarlos para evitar que estén guardando de anteriores
            Optimos = [];
            EnProcesos = [];
            Rezagos = [];
            RezNoInfo = [];
            NoDispo = [];
            NoMedible = [];

            //La idea es que por cada municipio (feature) verifique cuantos optimos tiene, cuantos en proceso, etc.
            //Y solo depende del año, por lo que hay que cortar a las columnas que terminan en ese año
            let columnas_modulo= Object.keys(geojsonFiltrado.properties).filter(col => col.split("_")[3] === A).concat(["NOMGEO"]);



            const geojsonFiltrado2 = filtrarPorCol(Data2, columnas_modulo);
            geojsonFiltrado2.features.forEach(feature => {
                // contar valores iguales a 1
                let z1 = Object.values(feature.properties).filter(v => Number(v) === 1).length;
                Optimos.push(z1);

                let z2 = Object.values(feature.properties).filter(v => Number(v) === 2).length;
                EnProcesos.push(z2);

                let z3 = Object.values(feature.properties).filter(v => Number(v) === 3).length;
                Rezagos.push(z3);

                let z4 = Object.values(feature.properties).filter(v => Number(v) === 4).length;
                NoMedible.push(z4);

                let z5 = Object.values(feature.properties).filter(v => Number(v) === 5).length;
                RezNoInfo.push(z5);

                let z0 = Object.values(feature.properties).filter(v => Number(v) === 0).length;
                NoDispo.push(z1);

                Gráfica_Barras0(A)
            });
        }

            ]
            };
            if (Grafica2) {

            }
            Grafica2 = new Chart(ctx2, {

        //Aqui vienen dos funciones un poco rebuscadas:

        //Esta se refiere a si queremos ver la Grafica por Módulo-Año-Municipio (1) o la de total por año (2)

            Año=A;

                document.getElementById("Bttn_M").style.background="#FFFFFF";
                document.getElementById("Bttn_M").style.color="#000000";

                document.getElementById("Bttn_A").style.color="#FFFFFF";

                document.getElementById("selector_modulo").style.visibility="hidden";
                Tarjeta_por_Año(A);
                OpcionSeleccionada=2; //y por tanto estamos en la segunda opción
                document.getElementById('Titulo2').textContent="Totales por Municipio";
                document.getElementById('T1').style.visibility="hidden";
                document.getElementById('T2').style.visibility="hidden";

                document.getElementById('T2').style.visibility="visible";
            }
        }
        //Y esta función es solo para que el mismo select de año funcione para las dos opciones anteriores
        function Graficar_Año(M,A){

                Crear_Graficas(M,A);
            }
            if(OpcionSeleccionada==2){

            }
